<html>
    <head>
        <title>Register a Course</title>
        <style>
            body {
                background-color: lightskyblue;
                text-align: center; 
            }

            form {
                margin:  auto;
                padding: 20px;
                width: 400px; 
                background-color: #d2f607;
            }

            input, select, button {
                width: 90%;
                padding: 10px;
                margin: 10px;
            }

            button {
                background-color: #4CAF50;
                color: white; 
                font-weight: bold;
                font-size: medium;
                cursor: pointer; 
            }

            button:hover {
                background-color:white; 
                color: #4CAF50;
            }

        </style>
    </head>
    
    <body>
        <h1 style="color: red;">Kickstart with an exciting course!</h1>

        <form action="http://localhost:8080/courses/register" method="post">
            <label for="name">Enter Your Name:</label><br>
            <input type="text" name="name"><br><br>

            <label for="email">Enter Your emailId:</label><br>
            <input type="email" name="emailId"><br><br>

            <label for="course">Choose a Course:</label><br>
            <select name="courseName" id="course">
                <option value="Java Essentials">Java Essentials</option>
                <option value="Python For ML">Python For ML</option>
                <option value="SpringBoot">SpringBoot</option>
            </select>  
            
            <br><br>
            <button type="submit">Submit</button>

            
        </form>
    </body>
</html>
